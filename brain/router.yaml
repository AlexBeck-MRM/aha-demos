      - projects/{current_project}/retrieval-index.yaml
    allowed_writes:
      - knowledge/distilled/
      - projects/{current_project}/session-log.md
      - logs/decision-log.md
    required_logs:
      - projects/{current_project}/session-log.md

  - id: board-review
    required_reads:
      - knowledge/sources/figma-design-workbench/index.md
      - design/figma/workbench-section-map.yaml
      - projects/current-project.yaml
      - projects/{current_project}/retrieval-index.yaml
    allowed_writes:
      - design/ui-style-inventory/
      - projects/{current_project}/session-log.md
      - logs/decision-log.md
    required_logs:
      - projects/{current_project}/session-log.md

  - id: inventory-update
    required_reads:
      - knowledge/sources/index.yaml
      - knowledge/distilled/canonical-brief.md
      - design/ui-style-inventory/README.md
      - design/figma/workbench-section-map.yaml
      - projects/current-project.yaml
      - projects/{current_project}/retrieval-index.yaml
