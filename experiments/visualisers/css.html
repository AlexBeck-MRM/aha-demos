<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organic Vessel Background - CSS</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Organic vessel heartbeat background">
      <div id="cssFx" class="css-vessel">
        <div class="css-vessel__layer css-vessel__layer--a"></div>
        <div class="css-vessel__layer css-vessel__layer--b"></div>
        <div class="css-vessel__layer css-vessel__layer--c"></div>
        <div class="css-vessel__layer css-vessel__layer--d"></div>
      </div>
    </main>

    <aside id="controls" class="controls">
      <div class="controls__top">
        <div class="controls__title-wrap">
          <p class="controls__eyebrow">CHADCDN UX</p>
          <h2 class="controls__title">CSS Controls</h2>
          <p class="controls__hint">Press <kbd>H</kbd> to hide</p>
        </div>
        <button id="resetButton" class="ui-button ui-button--primary" type="button">Apply Defaults</button>
      </div>
      <section class="controls__defaults">
        <div class="controls__section-head">
          <h3>Core Defaults</h3>
          <p>Baseline controls first</p>
        </div>
        <div id="defaultList" class="controls__default-list"></div>
      </section>
      <div class="controls__divider" role="presentation"></div>
      <div class="controls__section-head">
        <h3>Advanced Groups</h3>
        <p>Fine tuning by system</p>
      </div>
      <div id="controlList" class="controls__list"></div>
      <div class="controls__presets"></div>
    </aside>

    <script type="module" src="./js/css-version.js"></script>
  </body>
</html>
