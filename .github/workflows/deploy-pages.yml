name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static Pages artifact
        run: |
          set -euo pipefail
          rm -rf .pages-site
          mkdir -p .pages-site/reference/evidence .pages-site/reference .pages-site/experiments
          cp index.html .pages-site/
          cp README.md .pages-site/
          cp -R reference/evidence/prototypes .pages-site/reference/evidence/
          cp -R reference/assets .pages-site/reference/
          cp -R experiments/visualisers .pages-site/experiments/
          cp .nojekyll .pages-site/.nojekyll
          find .pages-site -type l -print -quit | (! read -r _)
          test -f .pages-site/index.html
          test -f .pages-site/reference/evidence/prototypes/aha-living-gradient-playground-2026-06-26/index.html
          test -f .pages-site/reference/evidence/prototypes/aha-spatial-tabs-cards-playground-2026-06-29/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
