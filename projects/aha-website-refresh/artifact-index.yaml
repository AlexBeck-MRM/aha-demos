project_id: aha-website-refresh
status: active
updated: 2026-06-26
purpose: Fast lookup for current artifacts, source notes, previews, and cleanup status.

lookup_rule:
  - read this file before broad searching for prototypes, boards, presentations, route docs, or evidence
  - use primary_entry first
  - use source_notes for rationale and evidence
  - use supporting_files for renders, previews, and implementation details
  - treat cleanup_tag as a placement note, not permission to delete

cleanup_tags:
  current: Active working artifact. Keep easy to find.
  supporting: Still useful as source, evidence, or context.
  superseded: Older artifact kept for traceability. Do not use as current.
  out_of_place: Useful artifact in the wrong folder or naming pattern.
  generated: Rebuildable output. Keep only if it is the reviewed artifact.
  local_scratch: Local-only or ignored scratch. Remove or promote after review.
  completed: Cleanup action has been handled.
  review_for_removal: Candidate for deletion after owner confirms no active use.
  review_for_relocation: Candidate for move to a durable folder after references are updated.

