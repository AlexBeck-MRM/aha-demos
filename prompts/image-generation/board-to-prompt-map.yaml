prompt_system: master-styleframe-prompt

shared_foundation:
  source_files:
    - knowledge/distilled/canonical-brief.md
    - knowledge/distilled/project-summary.md
    - design/routes/route-comparison.md
  inject_into:
    - shared_aha_foundation
    - avoid

styleframes:
  styleframe_01:
    purpose_file: design/styleframes/01-brand-presence.md
    inject_into:
      - styleframe_block
      - composition_priority
      - required_ingredients
    output_variants:
      - file: prompts/image-generation/styleframe-01.md
        route: route_a
      - file: prompts/image-generation/styleframe-01.md
        route: route_b
  styleframe_02:
    purpose_file: design/styleframes/02-website-ecosystem.md
    inject_into:
      - styleframe_block
      - composition_priority
      - required_ingredients
    output_variants:
      - file: prompts/image-generation/styleframe-02.md
        route: route_a
      - file: prompts/image-generation/styleframe-02.md
        route: route_b

standalone_prompts:
  healthy_living_topic_grid_route2:
    file: prompts/image-generation/healthy-living-topic-grid-route2.md
    prompt_file: prompts/image-generation/healthy-living-topic-grid-route2.prompt.txt
    purpose: Generate a self-contained 3x2 raster illustration reference board for the six Healthy Living guide topics.
    source_files:
      - design/ui-style-inventory/illustration-style.md
      - design/ui-style-inventory/icons.md
      - reference/evidence/mockups/aha-healthy-living-adaptive-super-hub-2026-05-07/healthy-living-adaptive-super-hub-default-variants.png
  icon_style_evolution_sheet:
    file: prompts/image-generation/icon-style-evolution-sheet.md
    purpose: Generate a 6x6 raster comparison sheet for Line, Restrained Solid, and Tonal Cutout icon directions.
    source_files:
      - design/ui-style-inventory/color-scheme.md
      - design/ui-style-inventory/illustration-style.md
      - logs/decision-log.md
  restrained_solid_icon_preview:
    file: prompts/image-generation/restrained-solid-icon-preview.md
    purpose: Generate a focused 4x4 restrained-solid raster icon reference sheet.
    source_files:
      - design/ui-style-inventory/color-scheme.md
      - design/ui-style-inventory/illustration-style.md
      - logs/decision-log.md
  spatial_icon_style_exploration:
    file: prompts/image-generation/spatial-icon-style-exploration.md
    purpose: Generate a comparison sheet for early spatial icon style directions, including the Lava-adjacent route.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/ui-style-inventory/illustration-style.md
      - design/generated/review/2026-06-17-icon-style-exploration/manifest.md
  medical_soft_spatial_icon_preview:
    file: prompts/image-generation/medical-soft-spatial-icon-preview.md
    purpose: Generate early Medical Soft Spatial icon preview sheets before the colour-block style was accepted.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/generated/review/2026-06-17-medical-soft-spatial-iteration/manifest.md
  medical_soft_spatial_natural_colour_preview:
    file: prompts/image-generation/medical-soft-spatial-natural-colour-preview.md
    purpose: Generate a natural-colour preview that tested the boundary between useful local colour and over-realistic detail.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/generated/review/2026-06-17-medical-soft-spatial-iteration/manifest.md
  medical_soft_spatial_colour_block_pilot:
    file: prompts/image-generation/medical-soft-spatial-colour-block-pilot.md
    purpose: Generate the six-icon pilot that established the accepted colour-block behavior.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/generated/review/2026-06-17-medical-soft-spatial-iteration/manifest.md
  medical_soft_spatial_colour_block_icons:
    file: prompts/image-generation/medical-soft-spatial-colour-block-full-sheet.md
    purpose: Generate the accepted 12-icon Medical Soft Spatial - Colour Block reference sheet.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/ui-style-inventory/color-scheme.md
      - knowledge/distilled/canonical-brief.md
      - design/generated/icons/medical-soft-spatial-colour-block/manifest.md
  medical_soft_spatial_colour_block_stress_test:
    file: prompts/image-generation/medical-soft-spatial-colour-block-stress-test.md
    purpose: Generate a 12-icon stress-test sheet for new AHA subjects in the accepted Medical Soft Spatial - Colour Block style.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/generated/icons/medical-soft-spatial-colour-block/manifest.md
      - design/generated/review/2026-06-17-medical-soft-spatial-stress-test/manifest.md
  flat_clinical_line_icon_sheet:
    file: prompts/image-generation/flat-clinical-line-icon-sheet.md
    purpose: Generate a bitmap reference sheet for a flat, line-based AHA icon style candidate.
    source_files:
      - design/ui-style-inventory/icons.md
      - design/generated/review/2026-06-23-flat-clinical-line/manifest.md
  one_colour_topic_icon_sheet:
    file: prompts/image-generation/one-colour-topic-icon-sheet.md
    purpose: Generate a transparent one-colour topic icon sheet with same-size cutout cells.
    source_files:
      - design/generated/review/2026-06-23-flat-clinical-line/manifest.md
      - design/generated/review/2026-06-24-one-colour-topic-icons/manifest.md

routes:
  route_a:
    source_files:
      - design/routes/route-a.md
      - design/routes/route-deltas.md
      - logs/route-evolution.md
    inject_into:
      - route_block
      - composition_tuning
      - avoid
  route_b:
    source_files:
      - design/routes/route-b.md
      - design/routes/route-deltas.md
      - logs/route-evolution.md
    inject_into:
      - route_block
      - composition_tuning
      - avoid

board_rule_groups:
  surface:
    source_files:
      - design/ui-style-inventory/color-scheme.md
      - design/ui-style-inventory/gradients.md
      - design/ui-style-inventory/depth.md
    inject_into:
      - board_derived_rules.surface
  navigation_and_discovery:
    source_files:
      - design/ui-style-inventory/nav-elements.md
      - design/ui-style-inventory/mega-menu.md
      - design/ui-style-inventory/search.md
      - design/ui-style-inventory/tabs.md
      - design/ui-style-inventory/links-and-guidance.md
    inject_into:
      - board_derived_rules.navigation_and_discovery
  content_and_hierarchy:
    source_files:
      - design/ui-style-inventory/headlines.md
      - design/ui-style-inventory/text-hierarchy.md
      - design/ui-style-inventory/content.md
      - design/ui-style-inventory/page-templates.md
      - design/ui-style-inventory/article-intros.md
    inject_into:
      - board_derived_rules.content_and_hierarchy
  modules:
    source_files:
      - design/ui-style-inventory/buttons.md
      - design/ui-style-inventory/cards.md
      - design/ui-style-inventory/forms.md
      - design/ui-style-inventory/motion-reveals.md
    inject_into:
      - board_derived_rules.modules
  imagery_and_trust:
    source_files:
      - design/ui-style-inventory/image-types.md
      - design/ui-style-inventory/image-cropping.md
      - design/ui-style-inventory/photography-treatment.md
      - design/ui-style-inventory/trust-cues.md
    inject_into:
      - board_derived_rules.imagery_and_trust

research_guardrails:
  source_files:
    - knowledge/distilled/experience-research-hypotheses.md
    - knowledge/sources/experience-insights-mergers/hypotheses-and-conclusions.md
    - knowledge/sources/discovery-playback/master-playback-notes.md
    - knowledge/sources/discovery-playback/technology-playback-notes.md
  enforce:
    - trust_grows_through_clarity
    - editorial_expression_cannot_break_information_scent
    - search_and_navigation_must_feel_systemic_not_cosmetic
    - homepage_should_explain_what_aha_does_before_fragmenting_attention
